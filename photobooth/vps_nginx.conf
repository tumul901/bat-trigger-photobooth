server {
    listen 80;
    server_name bat-trigger-photobooth.2209.in;

    # Serve the built React frontend
    location / {
        root /var/www/bat-trigger-photobooth/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to FastAPI backend
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket proxy for real-time wall updates
    location /ws {
        proxy_pass http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Backend static assets (ball.png, etc.)
    location /backend-assets {
        proxy_pass http://127.0.0.1:8000/backend-assets;
    }
}
