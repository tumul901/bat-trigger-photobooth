server {
    listen 80;
    server_name bat-trigger-photobooth.2209.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bat-trigger-photobooth.2209.in;

    ssl_certificate /etc/letsencrypt/live/bat-trigger-photobooth.2209.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bat-trigger-photobooth.2209.in/privkey.pem;

    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /backend-assets {
        proxy_pass http://127.0.0.1:8000/backend-assets;
    }
}
